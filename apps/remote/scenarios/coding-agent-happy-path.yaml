# Simulated Coding Remote Agent: a coherent successful coding task showing
# Thinking Process, optional Internal Thinking, model progress, and Tool
# Activity as A2A-compatible content, ending in a brief `completed` message.
# @see specs/tickets/05-coding-agent-content-happy-path.md
id: coding-agent-happy-path
match:
  contains:
    - "fix the login bug"
steps:
  - event: status-update
    state: working
    message: "Starting work on the login bug."
  - event: status-update
    message: "Inspecting the repository and locating the code paths related to the login bug."
    delayMs: 20
  - event: status-update
    message: "Internal thinking: the validation check runs before the session token is refreshed, so fixing the order should resolve the bug."
    delayMs: 20
  - event: status-update
    message: "Drafting a code change that reorders the session validation."
    delayMs: 20
  - event: artifact-update
    artifact:
      artifactId: patch-1
      name: "login-session-order.patch"
      description: "Reorders session validation to run after the token refresh."
      metadata:
        kind: patch
      parts:
        - kind: text
          text: "--- a/session.ts\n+++ b/session.ts\n@@ refresh before validate"
    delayMs: 20
  - event: artifact-update
    artifact:
      artifactId: patch-1
      parts:
        - kind: text
          text: "\n@@ trailing whitespace cleanup"
    append: true
    lastChunk: true
    delayMs: 20
  - event: status-update
    message: "Tool: running the checkout test suite against the change."
    delayMs: 20
  - event: status-update
    message: "Tool result: all 42 tests passed."
    delayMs: 20
  - event: artifact-update
    artifact:
      artifactId: implementation-summary-1
      name: "Login bug fix summary"
      description: "Reordered session validation so the token refresh runs first, verified by the checkout test suite."
      metadata:
        kind: implementation-summary
      parts:
        - kind: text
          text: "Reordered session validation so the token refresh runs first, verified by the checkout test suite."
    delayMs: 20
  - event: status-update
    state: completed
    message: "Fixed the login bug and verified tests pass."
    final: true
    delayMs: 20
